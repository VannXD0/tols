<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>XK TOOLS • Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: radial-gradient(circle at 20% 30%, #0A0F1E, #03060C);
            font-family: 'Inter', sans-serif;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .card {
            background: rgba(8,12,20,0.85);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(0,255,255,0.3);
        }
        .game-card {
            background: rgba(16,20,30,0.7);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
        }
        .game-icon {
            width: 60px; height: 60px;
            background: linear-gradient(135deg, #1E3A8A, #3B82F6);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .game-icon img { width: 40px; height: 40px; }
        .nav-bar {
            display: flex;
            background: rgba(16,20,30,0.7);
            border-radius: 60px;
            padding: 6px;
            margin-top: 30px;
            gap: 6px;
        }
        .nav-item {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            color: #9CA3AF;
        }
        .nav-item.active {
            background: linear-gradient(95deg, #2563EB, #3B82F6);
            color: white;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2 style="color:#0FF;">XK TOOLS</h2>
        <div class="game-card" data-game="freefire">
            <div class="game-icon"><img src="img/freefire.png" alt="FF"></div>
            <div>Free Fire</div>
        </div>
        <div class="game-card" data-game="freefiremax">
            <div class="game-icon"><img src="img/freefiremax.png" alt="FF MAX"></div>
            <div>Free Fire MAX</div>
        </div>
    </div>
    <div class="nav-bar">
        <div class="nav-item active" data-page="game">Game</div>
        <div class="nav-item" data-page="fitur">Fitur</div>
        <div class="nav-item" data-page="visual">Visual</div>
        <div class="nav-item" data-page="info">Info Akun</div>
    </div>
</div>
<script>
    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.addEventListener('click', () => {
            const page = btn.getAttribute('data-page');
            if (page === 'fitur') window.location.href = 'fitur.html';
            else if (page === 'visual') window.location.href = 'visual.html';
            else if (page === 'info') window.location.href = 'info.html';
        });
    });
    document.querySelectorAll('.game-card').forEach(card => {
        card.addEventListener('click', () => {
            alert("Fitur game akan diimplementasikan");
        });
    });
</script>
</body>
</html>
